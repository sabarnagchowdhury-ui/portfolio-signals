// ── HELPERS ────────────────────────────────────────────────────────────────
const fmt    = (n, dec = 0) => new Intl.NumberFormat("en-IN", { maximumFractionDigits: dec, minimumFractionDigits: dec }).format(n);
const fmtCr  = n => { const cr = n / 10000000; return cr >= 1 ? `₹${cr.toFixed(2)} Cr` : `₹${fmt(n / 100000, 1)}L`; };
const fmtUSD = (n, rates) => `$${fmt(n / rates.USD_INR, 0)}`;
const fmtQAR = (n, rates) => `QAR ${fmt(n / rates.QAR_INR, 0)}`;
const pct    = (val, total) => total ? Math.min(100, (val / total) * 100) : 0;
const nowStr = () => new Date().toLocaleDateString("en-IN", { month: "short", year: "numeric" });
const todayKey = () => new Date().toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });

function inrTo(valueINR, currency, rates) {
  if (currency === "INR") return fmtCr(valueINR);
  if (currency === "USD") return `$${fmt(valueINR / rates.USD_INR, 0)}`;
  if (currency === "QAR") return `QAR ${fmt(valueINR / rates.QAR_INR, 0)}`;
  return fmtCr(valueINR);
}

// PnL badge helper
function pnlInfo(principal, current) {
  if (!principal || principal === 0) return null;
  const pnl = current - principal;
  const pct = ((pnl / principal) * 100).toFixed(1);
  return { pnl, pct, color: pnl >= 0 ? "#34d399" : "#f87171", sign: pnl >= 0 ? "+" : "" };
}

function useStorage() {
  const load = () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? { ...DEFAULT_MANUAL, ...JSON.parse(raw) } : { ...DEFAULT_MANUAL };
    } catch { return { ...DEFAULT_MANUAL }; }
  };
  const [data, setData] = useState(load);
  const save = useCallback(d => { setData(d); try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }, []);
  return [data, save];
}

// ── SIMPLE LINE CHART ──────────────────────────────────────────────────────
function LineChart({ data, keys, colors, labels, height = 160 }) {
  if (!data || data.length < 2) return (
    <div style={{ textAlign: "center", color: "#374151", fontSize: 11, fontFamily: "DM Sans", padding: 20 }}>
      Need at least 2 data points to chart
    </div>
  );
  const allVals = data.flatMap(d => keys.map(k => d[k]).filter(v => v != null));
  const min = Math.min(...allVals) * 0.95;
  const max = Math.max(...allVals) * 1.02;
  const W = 520, H = height;
  const xStep = W / (data.length - 1);
  const yScale = v => H - ((v - min) / (max - min)) * H;
  const path = (key) => data.map((d, i) => `${i === 0 ? "M" : "L"}${i * xStep},${yScale(d[key])}`).join(" ");
  return (
    <div style={{ overflowX: "auto" }}>
      <svg viewBox={`0 0 ${W} ${H + 30}`} style={{ width: "100%", minWidth: 300 }}>
        {[0.25, 0.5, 0.75, 1].map(f => (
          <line key={f} x1={0} y1={yScale(min + (max - min) * f)} x2={W} y2={yScale(min + (max - min) * f)}
            stroke="#1e2d45" strokeWidth={1} strokeDasharray="4,4" />
        ))}
        {keys.map((k, ki) => (
          <g key={k}>
            <path d={path(k)} fill="none" stroke={colors[ki]} strokeWidth={2.5} strokeLinejoin="round" />
            {data.map((d, i) => d[k] != null && (
              <circle key={i} cx={i * xStep} cy={yScale(d[k])} r={3} fill={colors[ki]} />
            ))}
          </g>
        ))}
        {data.map((d, i) => (
          <text key={i} x={i * xStep} y={H + 20} textAnchor="middle" fill="#475569" fontSize={9} fontFamily="DM Mono">{d.year || d.month?.split(" ")[0]}</text>
        ))}
        {keys.map((k, ki) => (
          <g key={k} transform={`translate(${ki * 130}, ${H + 28})`}>
            <rect width={8} height={3} fill={colors[ki]} rx={1} y={-1} />
            <text x={12} fill="#a0aec0" fontSize={8} fontFamily="DM Sans">{labels[ki]}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

// ── DONUT CHART ────────────────────────────────────────────────────────────
function DonutChart({ slices }) {
  const total = slices.reduce((s, x) => s + x.value, 0);
  let angle = -90;
  const R = 60, cx = 80, cy = 80;
  const arcs = slices.map(s => {
    const a = (s.value / total) * 360;
    const startAngle = angle;
    angle += a;
    const toRad = d => (d * Math.PI) / 180;
    const x1 = cx + R * Math.cos(toRad(startAngle));
    const y1 = cy + R * Math.sin(toRad(startAngle));
    const x2 = cx + R * Math.cos(toRad(angle - 0.1));
    const y2 = cy + R * Math.sin(toRad(angle - 0.1));
    const large = a > 180 ? 1 : 0;
    return { ...s, d: `M ${cx} ${cy} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} Z`, pct: ((s.value / total) * 100).toFixed(1) };
  });
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
      <svg viewBox="0 0 160 160" style={{ width: 140, flexShrink: 0 }}>
        <circle cx={cx} cy={cy} r={38} fill="#0d1525" />
        {arcs.map((a, i) => <path key={i} d={a.d} fill={a.color} opacity={0.9} />)}
        <text x={cx} y={cy - 6} textAnchor="middle" fill="#e2e8f0" fontSize={11} fontWeight="bold" fontFamily="DM Mono">NET</text>
        <text x={cx} y={cy + 8} textAnchor="middle" fill="#e2e8f0" fontSize={11} fontWeight="bold" fontFamily="DM Mono">WORTH</text>
      </svg>
      <div style={{ flex: 1 }}>
        {arcs.map((a, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: a.color, flexShrink: 0 }} />
            <span style={{ fontSize: 11, color: "#a0aec0", fontFamily: "DM Sans", flex: 1 }}>{a.label}</span>
            <span style={{ fontSize: 10, color: "#64748b", fontFamily: "DM Mono" }}>{a.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

              );
            }
            const trend = getTrend(row.field, sorted);
            const isLiability = row.isLiability;
            const trendColor = trend == null ? "#374151"
              : (isLiability ? (trend < 0 ? "#34d399" : "#f87171") : (trend >= 0 ? "#34d399" : "#f87171"));
            return (
              <tr key={ri} style={{ borderBottom: "1px solid #0d1525" }}
                onMouseEnter={e => e.currentTarget.style.background = "#0d1a2d"}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <td style={{ position: "sticky", left: 0, background: "#060d1a", padding: "7px 12px", fontSize: 11, color: "#94a3b8", fontFamily: "DM Sans" }}>{row.label}</td>
                {sorted.map((h, i) => {
                  const val = h[row.field];
                  const prevVal = i > 0 ? sorted[i - 1][row.field] : null;
                  const diff = (val != null && prevVal != null) ? val - prevVal : null;
                  const diffColor = diff == null ? null
                    : (isLiability ? (diff < 0 ? "#34d399" : "#f87171") : (diff >= 0 ? "#34d399" : "#f87171"));
                  return (
                    <td key={i} style={{ padding: "7px 12px", textAlign: "right", fontSize: 11, fontFamily: "DM Mono", color: "#e2e8f0" }}>
                      {fmtCell(val)}
                      {diff !== null && diff !== 0 && (
                        <div style={{ fontSize: 8, color: diffColor, marginTop: 1 }}>
                          {diff >= 0 ? "▲" : "▼"} {fmtCr(Math.abs(diff))}
                        </div>
                      )}
                    </td>
                  );
                })}
                <td style={{ padding: "7px 12px", textAlign: "right", fontSize: 10, fontFamily: "DM Mono", color: trendColor }}>
                  {trend != null ? (
                    <span style={{ background: trendColor + "18", borderRadius: 4, padding: "2px 6px" }}>
                      {trend >= 0 ? "▲" : "▼"} {fmtCr(Math.abs(trend))}
                    </span>
                  ) : "—"}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── MAIN DASHBOARD ─────────────────────────────────────────────────────────
function Dashboard() {
  const [manual, saveManual] = useStorage();
  const [form, setForm] = useState(manual);
  const [tab, setTab] = useState(0);
  const [currency, setCurrency] = useState("INR");
  // "principal" = show invested cost | "current" = show current value with PnL
  const [investView, setInvestView] = useState("current");
  const [githubData, setGithubData] = useState(null);
  const [goldPrice, setGoldPrice] = useState(null);
  const [rates, setRates] = useState({ ...FALLBACK, _live: false });
  const [loading, setLoading] = useState({ github: true, gold: true, fx: true });
  const [lastUpdated, setLastUpdated] = useState(null);
  const [showSaved, setShowSaved] = useState(false);
  const loadGhCfg = () => { try { const r = localStorage.getItem(GH_CFG_KEY); return r ? JSON.parse(r) : { user: "", repo: "", token: "" }; } catch { return { user: "", repo: "", token: "" }; } };
  const [ghCfg, setGhCfg] = useState(loadGhCfg);
  const [ghStatus, setGhStatus] = useState("");
  const [ghLoading, setGhLoading] = useState(false);
  const [ghFileSha, setGhFileSha] = useState("");
  const saveGhCfg = (cfg) => { setGhCfg(cfg); try { localStorage.setItem(GH_CFG_KEY, JSON.stringify(cfg)); } catch {} };
  const loadFromGitHub = async () => {
    if (!ghCfg.user || !ghCfg.repo || !ghCfg.token) { setGhStatus("Enter credentials first"); return; }
    setGhLoading(true); setGhStatus("Loading...");
    try {
      const res = await fetch(ghApiUrl(ghCfg.user, ghCfg.repo), { headers: ghHeaders(ghCfg.token) });
      if (!res.ok) throw new Error("GitHub error " + res.status);
      const json = await res.json();
      const decoded = JSON.parse(atob(json.content.split("\n").join("")));
      setGhFileSha(json.sha);
      saveManual({ ...DEFAULT_MANUAL, ...decoded });
      setForm({ ...DEFAULT_MANUAL, ...decoded });
      setGhStatus("Loaded from GitHub successfully");
    } catch (e) { setGhStatus("Load failed: " + e.message); }
    setGhLoading(false);
  };
  const saveToGitHub = async (dataToSave) => {
    if (!ghCfg.user || !ghCfg.repo || !ghCfg.token) return;
    try {
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(dataToSave, null, 2))));
      const body = { message: "Wealth update " + todayKey(), content: encoded, ...(ghFileSha ? { sha: ghFileSha } : {}) };
      const res = await fetch(ghApiUrl(ghCfg.user, ghCfg.repo), { method: "PUT", headers: ghHeaders(ghCfg.token), body: JSON.stringify(body) });
      if (!res.ok) throw new Error("GitHub error " + res.status);
      const json = await res.json();
      setGhFileSha(json.content && json.content.sha ? json.content.sha : ghFileSha);
      setGhStatus("Saved to GitHub");
    } catch (e) { setGhStatus("GitHub save failed: " + e.message); }
  };

  // Fetch live FX rates
  useEffect(() => {
    fetch(FX_API)
      .then(r => r.json())
      .then(d => {
        if (d?.rates) {
          const USD_INR = d.rates.INR || FALLBACK.USD_INR;
          const USD_QAR = d.rates.QAR || FALLBACK.USD_QAR;
          const QAR_INR = USD_INR / USD_QAR;
          setRates({ USD_INR, QAR_INR, USD_QAR, _live: true });
        }
        setLoading(p => ({ ...p, fx: false }));
      })
      .catch(() => setLoading(p => ({ ...p, fx: false })));
  }, []);

  // Fetch GitHub portfolio data
  useEffect(() => {
    fetch(`${GITHUB_RAW}/market_indices.json`)
      .then(r => r.json())
      .then(d => { setGithubData(d); setLoading(p => ({ ...p, github: false })); })
      .catch(() => setLoading(p => ({ ...p, github: false })));
  }, []);

  // Fetch gold price
  useEffect(() => {
    fetch(GOLD_API)
      .then(r => r.json())
      .then(d => {
        const usdPerTroyOz = Array.isArray(d) ? d[0]?.price : d?.price;
        if (usdPerTroyOz) {
          const inrPerGram = (usdPerTroyOz / 31.1035) * rates.USD_INR;
          setGoldPrice({ usdPerOz: usdPerTroyOz, inrPerGram22k: inrPerGram * 0.916, inrPerGram24k: inrPerGram });
        }
        setLoading(p => ({ ...p, gold: false }));
      })
      .catch(() => setLoading(p => ({ ...p, gold: false })));
  }, [rates.USD_INR]);

  // ── COMPUTE VALUES ──
  const usStocksCurrentUSD = githubData?.us_current_value_usd || githubData?.us_portfolio_value_usd || githubData?.total_value_usd || 16880.51;
  const usStocksCurrentINR = usStocksCurrentUSD * rates.USD_INR;
  const usStocksPrincipalUSD = manual.usStocksPrincipalUSD || 0;
  const usStocksPrincipalINR = usStocksPrincipalUSD * rates.USD_INR;

  const grossAssets = usStocksINR + indiaStocksINR + mfCurrentValue + manual.foCorpus + manual.goldJewellery + manual.malabarGold + manual.apartment + manual.gratuity + (manual.landCruiser || 0) * rates.QAR_INR + qatarBanksINR + indiaBanksINR;

  const ccLiabilitiesINR = ((manual.qatarAirwaysCC || 0) + (manual.luluCC || 0)) * rates.QAR_INR;
  const totalLiabilities = (manual.apartmentLoan || 0) + (manual.carLoan || 0) + ccLiabilitiesINR;
  const netWorth = grossAssets - totalLiabilities;

  const thisMonth = nowStr();
  const conservative = CONSERVATIVE_SCHEDULE.find(s => s.month === thisMonth)?.nw || CONSERVATIVE_SCHEDULE[0].nw;
  const kpiDelta = netWorth - conservative;

  const history = manual.history || [];

  const prevSnapshot = sortedHistory.length >= 1 ? sortedHistory[sortedHistory.length - 1] : null;
  const prevNW = prevSnapshot?.nw || null;
  const monthChange = prevNW ? netWorth - prevNW : null;

  const delta = (currentVal, field) => {
    if (!prevSnapshot || prevSnapshot[field] === undefined) return null;
    return currentVal - (prevSnapshot[field] || 0);
  };
  const fmtDelta = (d) => {
    if (d === null) return null;
    const sign = d >= 0 ? "+" : "";
    const abs = Math.abs(d);
    const val = abs >= 10000000 ? `₹${(abs / 10000000).toFixed(2)}Cr` : abs >= 100000 ? `₹${(abs / 100000).toFixed(1)}L` : `₹${Math.round(abs).toLocaleString("en-IN")}`;
    return { text: `${sign}${val}`, color: d >= 0 ? "#34d399" : "#f87171" };

    { label: "Apartment",      value: manual.apartment,                   color: "#a78bfa" },
    { label: "Gratuity",       value: manual.gratuity,                   color: "#f472b6" },
    { label: "Cash (Banks)",   value: qatarBanksINR + indiaBanksINR,     color: "#6ee7b7" },

  // ── SAVE ──
  const handleSave = () => {
    const prev = manual.history || [];
    const entry = {
      date: todayKey(),
      nw: netWorth, conservative, grossAssets, totalLiabilities,
      usStocksINR: usStocksCurrentINR, usStocksCurrentUSD, usStocksPrincipalINR, usStocksPrincipalUSD,

      qatarBanksINR, indiaBanksINR,

    saveManual(updated);

              principalINR={indiaStocksPrincipal}

              view={investView}

              rates={rates}
              color="#38bdf8"
              loading={loading.github}

                  <span style={{ fontSize: 11, color: "#94a3b8", fontFamily: "DM Sans" }}>{r.label}</span>
                  <div style={{ textAlign: "right" }}>
                    <span style={{ fontSize: 11, color: r.color, fontFamily: "DM Mono" }}>{r.val}</span>
                    <span style={{ fontSize: 10, color: "#374151", fontFamily: "DM Mono", marginLeft: 8 }}>{r.p}</span>
                  </div>
                </div>
              ))}
            </Card>
          </>
        )}

        {/* ── TAB 6: HISTORY ── */}
        {tab === 6 && (
          <>
            <SectionTitle n="7" title="Parameter History" icon="🗓️" />
            <div style={{ background: "#0a1228", border: "1px solid #1e3a5f", borderRadius: 10, padding: "10px 14px", marginBottom: 14, fontSize: 11, color: "#38bdf8", fontFamily: "DM Sans" }}>
              📋 Every column = one save. Scroll right for all dates. Now tracks Principal vs Current for stocks & MF.
            </div>
            <Card>
              <ParamHistoryTable history={manual.history || []} />
            </Card>
            {(manual.history || []).length > 1 && (
              <Card>
                <div style={{ fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 14, fontFamily: "DM Sans" }}>Net Worth Trend</div>
                <LineChart
                  data={sortedHistory.map(h => ({ month: h.date, nw: h.nw }))}
                  keys={["nw"]} colors={["#f0b429"]} labels={["Net Worth"]} height={120}
                />
              </Card>
            )}
          </>
        )}


        {tab === 7 && (
          <>
            <SectionTitle n="8" title="GitHub Storage" icon="⚙️" />
            <div style={{ background: "#0a1228", border: "1px solid #1e3a5f", borderRadius: 10, padding: "10px 14px", marginBottom: 14, fontSize: 11, color: "#38bdf8", fontFamily: "DM Sans" }}>
              Your wealth data saves to your private GitHub repo — free forever, fully private.
            </div>
            <Card>
              <div style={{ fontSize: 11, color: "#f0b429", textTransform: "uppercase", letterSpacing: 2, marginBottom: 16, fontFamily: "DM Sans" }}>GitHub Credentials</div>
              <div style={{ marginBottom: 12 }}>
                <label style={{ display: "block", fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4, fontFamily: "DM Sans" }}>GitHub Username</label>
                <input type="text" value={ghCfg.user} onChange={e => setGhCfg(p => ({ ...p, user: e.target.value }))} placeholder="your-github-username"
                  style={{ width: "100%", background: "#0d1525", border: "1px solid #1e2d45", borderRadius: 8, padding: "8px 12px", color: "#e2e8f0", fontSize: 13, fontFamily: "DM Mono", outline: "none" }} />
              </div>
              <div style={{ marginBottom: 12 }}>
                <label style={{ display: "block", fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4, fontFamily: "DM Sans" }}>Private Repo Name</label>
                <input type="text" value={ghCfg.repo} onChange={e => setGhCfg(p => ({ ...p, repo: e.target.value }))} placeholder="my-wealth-data"
                  style={{ width: "100%", background: "#0d1525", border: "1px solid #1e2d45", borderRadius: 8, padding: "8px 12px", color: "#e2e8f0", fontSize: 13, fontFamily: "DM Mono", outline: "none" }} />
              </div>
              <div style={{ marginBottom: 16 }}>
                <label style={{ display: "block", fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4, fontFamily: "DM Sans" }}>Personal Access Token</label>
                <input type="password" value={ghCfg.token} onChange={e => setGhCfg(p => ({ ...p, token: e.target.value }))} placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
                  style={{ width: "100%", background: "#0d1525", border: "1px solid #1e2d45", borderRadius: 8, padding: "8px 12px", color: "#e2e8f0", fontSize: 13, fontFamily: "DM Mono", outline: "none" }} />
                <div style={{ fontSize: 9, color: "#374151", marginTop: 4, fontFamily: "DM Sans" }}>GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) → tick repo</div>
              </div>
              <button onClick={() => { saveGhCfg(ghCfg); setGhStatus("Config saved!"); }}
                style={{ background: "linear-gradient(135deg,#1e3a5f,#0f2040)", border: "1px solid #2d4a6e", borderRadius: 10, padding: "10px 20px", color: "#f0b429", fontFamily: "DM Sans", fontWeight: 700, fontSize: 13, cursor: "pointer", width: "100%", marginBottom: 10 }}>
                Save Config
              </button>
              <button onClick={loadFromGitHub} disabled={ghLoading}
                style={{ background: "linear-gradient(135deg,#052e16,#064e3b)", border: "1px solid #065f46", borderRadius: 10, padding: "10px 20px", color: "#34d399", fontFamily: "DM Sans", fontWeight: 700, fontSize: 13, cursor: "pointer", width: "100%", marginBottom: 10, opacity: ghLoading ? 0.6 : 1 }}>
                {ghLoading ? "Loading..." : "Load Data from GitHub"}
              </button>
              {ghStatus && (
                <div style={{ background: "#0d1525", border: "1px solid #1e2d45", borderRadius: 8, padding: "8px 12px", fontSize: 11, color: ghStatus.includes("failed") || ghStatus.includes("error") ? "#f87171" : "#34d399", fontFamily: "DM Mono" }}>
                  {ghStatus}
                </div>
              )}
            </Card>
            <Card>
              <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12, fontFamily: "DM Sans" }}>Setup Steps</div>
              {["Create a free private repo on GitHub named my-wealth-data", "Inside the repo create a file called wealth_data.json with content {}", "Generate a Personal Access Token with repo scope — no expiry", "Enter details above and click Save Config", "Click Load Data from GitHub to restore your data on any device", "Every Save in Update tab auto-pushes to GitHub"].map((s, i) => (
                <div key={i} style={{ display: "flex", gap: 10, marginBottom: 10 }}>
                  <div style={{ width: 18, height: 18, borderRadius: "50%", background: "#1e3a5f", border: "1px solid #2d4a6e", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "#f0b429", fontFamily: "DM Mono", flexShrink: 0, marginTop: 1 }}>{i+1}</div>
                  <div style={{ fontSize: 11, color: "#94a3b8", fontFamily: "DM Sans", lineHeight: 1.5 }}>{s}</div>
                </div>
              ))}
            </Card>
          </>
        )}
        <div style={{ textAlign: "center", padding: "20px 0 8px", fontSize: 9, color: "#1e2d45", fontFamily: "DM Mono" }}>
          SABARNA · DBG WEALTH TRACKER · {new Date().getFullYear()} · PRIVATE & CONFIDENTIAL
        </div>
      </div>
    </>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById("root"));
domRoot.render(React.createElement(Dashboard));
</script>
</body>
</html>
